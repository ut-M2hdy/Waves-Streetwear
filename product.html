<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Store | Product</title>
  <link rel="stylesheet" href="styles.css?v=20260401-5">
</head>
<body>
  <header>
    <div class="logo">
      <img src="img/logo_waves_TRANS.png" alt="WaveStore logo">
    </div>
    <div class="header-actions">
      <a class="header-link-btn hidden" id="admin-btn" href="admin.html">Admin</a>
      <a class="header-link-btn hidden" id="profile-btn" href="profile.html">Edit Profile</a>
      <a class="header-link-btn hidden" id="history-btn" href="history.html">My History</a>
      <a class="header-link-btn" id="auth-btn" href="auth.html">Login</a>
      <button class="cta" onclick="window.location.href='/'">Back to Shop</button>
    </div>
  </header>

  <main class="product-page">
    <section class="product-main">
      <div id="product-gallery" class="product-gallery"></div>

      <aside class="order-card">
        <h1 id="product-name"></h1>
        <div class="price product-price" id="product-price"></div>
        <p class="desc" id="product-desc"></p>
        <label class="color-picker-label product-color">
          Color
          <div id="product-color-swatches" class="color-swatches"></div>
        </label>

        <form id="order-form" class="order-form">
          <label>Size
            <input type="hidden" name="size" id="size-value" value="M">
            <div id="size-swatches" class="size-swatches" role="radiogroup" aria-label="Select size">
              <button type="button" class="size-dot" data-size="S" aria-label="Size S">S</button>
              <button type="button" class="size-dot active" data-size="M" aria-label="Size M">M</button>
              <button type="button" class="size-dot" data-size="L" aria-label="Size L">L</button>
              <button type="button" class="size-dot" data-size="XL" aria-label="Size XL">XL</button>
              <button type="button" class="size-dot" data-size="XXL" aria-label="Size XXL">XXL</button>
            </div>
          </label>
          <label>Product amount
            <input required type="number" name="amount" min="1" step="1" value="1">
          </label>
          <div class="price-summary" id="price-summary">
            <div class="summary-row">
              <span>Product</span>
              <strong id="product-subtotal">0 Dt</strong>
            </div>
            <div class="summary-row">
              <span>Delivery</span>
              <strong id="delivery-fee">9 Dt</strong>
            </div>
            <div class="summary-row total-row">
              <span>Total</span>
              <strong id="order-total">0 Dt</strong>
            </div>
          </div>
          <fieldset class="payment-box">
            <legend>Payment method</legend>
            <label class="payment-option">
              <input type="radio" name="paymentMethod" value="cash_on_delivery" checked disabled>
              Cash on delivery
            </label>
          </fieldset>
          <label>Full name
            <input required name="fullName" placeholder="First Last">
          </label>
          <label>Phone number
            <input required name="phone" id="order-phone" value="+216" maxlength="12" placeholder="+216XXXXXXXX">
          </label>
          <label>Address for delivery
            <textarea required name="address" placeholder="Street, city, phone"></textarea>
          </label>
          <label>Note (optional)
            <textarea name="note" placeholder="Any extra info for delivery"></textarea>
          </label>
          <button class="btn primary" type="submit">Confirm Buy Now</button>
          <div class="confirmation" id="order-confirmation"></div>
        </form>
      </aside>
    </section>

    <section class="related-section">
      <h2>Other hoodies in this wave</h2>
      <div id="related-products" class="grid related-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-left">
      <div>© 2026, Waves Streetwear</div>
      <div class="contact-links">
        <span>Contact us:</span>
        <a class="contact-link" href="https://www.instagram.com/waves__streetwear/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a class="contact-link" href="https://www.tiktok.com/@waves_streetwear" target="_blank" rel="noopener noreferrer">TikTok</a>
        <a class="contact-link" href="https://www.facebook.com/profile.php?id=61580095130092&locale=ar_AR" target="_blank" rel="noopener noreferrer">Facebook</a>
      </div>
    </div>
    <a class="footer-link" href="privacy.html">Privacy policy</a>
  </footer>

  <script src="products-data.js?v=20260401-4"></script>
  <script src="auth-ui.js?v=20260401-4"></script>
  <script src="product.js?v=20260402-11"></script>
</body>
</html>
