<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | WAVES</title>
  <link rel="stylesheet" href="styles.css?v=20260401-5">
</head>
<body>
  <header>
    <div class="logo">
      <img src="img/logo_waves_TRANS.png" alt="WaveStore logo">
    </div>
    <div class="header-actions">
      <a class="header-link-btn hidden" id="admin-btn" href="admin.html">Admin</a>
      <a class="header-link-btn hidden" id="history-btn" href="history.html">My History</a>
      <a class="header-link-btn" href="index.html">Back to Shop</a>
      <a class="header-link-btn" id="auth-btn" href="auth.html">Login</a>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>Edit contact</h1>
      <form id="profile-contact-form" class="order-form">
        <label>Phone
          <input id="profile-phone" name="phone" required value="+216" maxlength="12" placeholder="+216XXXXXXXX" readonly>
        </label>
        <label>Address
          <textarea id="profile-address" name="address" required readonly></textarea>
        </label>
        <label id="profile-password-wrap" class="hidden">Password confirmation
          <input id="profile-contact-password" name="password" type="password" disabled>
        </label>
        <div class="btn-row">
          <button id="profile-edit-btn" class="btn" type="button">Edit</button>
          <button id="profile-save-btn" class="btn primary hidden" type="submit">Save contact info</button>
        </div>
      </form>
    </section>

    <section class="auth-card">
      <h1>Change password</h1>
      <form id="profile-password-form" class="order-form">
        <label>Old password
          <input name="oldPassword" type="password" required>
        </label>
        <label>New password
          <input id="new-password" name="newPassword" type="password" minlength="8" required>
        </label>
        <div id="new-password-strength" class="password-strength level-low">Security level: low</div>
        <label>Confirm new password
          <input name="confirmNewPassword" type="password" minlength="8" required>
        </label>
        <button class="btn primary" type="submit">Change password</button>
      </form>
    </section>

    <div id="profile-message" class="confirmation"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-left">
      <div>© 2026, Waves Streetwear</div>
      <div class="contact-links">
        <span>Contact us:</span>
        <a class="contact-link" href="https://www.instagram.com/waves__streetwear/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a class="contact-link" href="https://www.tiktok.com/@waves_streetwear" target="_blank" rel="noopener noreferrer">TikTok</a>
        <a class="contact-link" href="https://www.facebook.com/profile.php?id=61580095130092&locale=ar_AR" target="_blank" rel="noopener noreferrer">Facebook</a>
      </div>
    </div>
    <a class="footer-link" href="privacy.html">Privacy policy</a>
  </footer>

  <script src="auth-ui.js?v=20260401-4"></script>
  <script src="profile.js?v=20260401-3"></script>
</body>
</html>
