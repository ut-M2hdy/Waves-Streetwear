<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | WAVES</title>
  <link rel="stylesheet" href="styles.css?v=20260401-5">
</head>
<body>
  <header>
    <div class="logo">
      <img src="img/logo_waves_TRANS.png" alt="WaveStore logo">
    </div>
    <div class="header-actions">
      <a class="header-link-btn" href="/">Back to Shop</a>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>Login</h1>
      <form id="login-form" class="order-form">
        <label>Phone
          <input name="phone" id="login-phone" required value="+216" maxlength="12" placeholder="+216XXXXXXXX">
        </label>
        <label>Password
          <input name="password" type="password" required>
        </label>
        <button class="btn primary" type="submit">Login</button>
      </form>
    </section>

    <section class="auth-card">
      <h1>Create account</h1>
      <p class="desc">Default account type is user. Admin can only be set by developer in database.</p>
      <form id="register-form" class="order-form">
        <label>Full name
          <input name="fullName" required placeholder="First Last">
        </label>
        <label>Phone
          <input name="phone" id="register-phone" required value="+216" maxlength="12" placeholder="+216XXXXXXXX">
        </label>
        <label>Address
          <textarea name="address" required placeholder="Street, city"></textarea>
        </label>
        <label>Password
          <input name="password" id="register-password" type="password" minlength="8" required>
        </label>
        <div id="password-strength" class="password-strength level-low">Security level: low</div>
        <label>Confirm password
          <input name="confirmPassword" type="password" minlength="8" required>
        </label>
        <button class="btn primary" type="submit">Create account</button>
      </form>
    </section>

    <div id="auth-message" class="confirmation"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-left">
      <div>© 2026, Waves Streetwear</div>
      <div class="contact-links">
        <span>Contact us:</span>
        <a class="contact-link" href="https://www.instagram.com/waves__streetwear/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a class="contact-link" href="https://www.tiktok.com/@waves_streetwear" target="_blank" rel="noopener noreferrer">TikTok</a>
        <a class="contact-link" href="https://www.facebook.com/profile.php?id=61580095130092&locale=ar_AR" target="_blank" rel="noopener noreferrer">Facebook</a>
      </div>
    </div>
    <a class="footer-link" href="/privacy">Privacy policy</a>
  </footer>

  <script src="auth.js?v=20260401-2"></script>
</body>
</html>
